name: Release and Tag - Develop PR Success

on:
  pull_request:
    branches:
      - develop
    types:
      - closed

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-develop:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Ensure Maven Wrapper executable
        run: chmod +x mvnw

      - name: CI validation
        run: ./mvnw -B -ntp clean verify

      - name: Create or Update Tag and Release
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const sha = pr.merge_commit_sha;
            const shortSha = sha.substring(0, 7);
            const now = new Date();
            const y = now.getUTCFullYear();
            const m = String(now.getUTCMonth() + 1).padStart(2, '0');
            const d = String(now.getUTCDate()).padStart(2, '0');
            const h = String(now.getUTCHours()).padStart(2, '0');
            const min = String(now.getUTCMinutes()).padStart(2, '0');

            const tag = `develop-pr-${pr.number}-${y}${m}${d}-${h}${min}-${shortSha}`;
            const releaseName = `Develop PR #${pr.number} Release ${y}-${m}-${d} ${h}:${min} UTC`;

            try {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/tags/${tag}`,
                sha
              });
              core.info(`Created tag ${tag}`);
            } catch (error) {
              if (error.status === 422) {
                core.info(`Tag ${tag} already exists, continuing.`);
              } else {
                throw error;
              }
            }

            const body = [
              `Automated release generated from merged PR #${pr.number} into develop.`,
              '',
              `PR: ${pr.html_url}`,
              `Merged by: ${pr.merged_by?.login || 'unknown'}`,
              `Commit: ${sha}`
            ].join('\n');

            let existingRelease = null;
            try {
              existingRelease = (await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag
              })).data;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            if (existingRelease) {
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existingRelease.id,
                name: releaseName,
                body,
                target_commitish: sha,
                draft: false,
                prerelease: true
              });
              core.info(`Updated release for tag ${tag}`);
            } else {
              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                target_commitish: sha,
                name: releaseName,
                body,
                draft: false,
                prerelease: true,
                generate_release_notes: true
              });
              core.info(`Created release for tag ${tag}`);
            }