name: CI Maven

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Permissões de execução para o Maven Wrapper
      run: chmod +x mvnw

    - name: Build
      run: ./mvnw clean package -DskipTests

    - name: Testes
      run: ./mvnw test